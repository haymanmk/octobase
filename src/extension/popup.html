<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { --ink:#212123; --paper:#f7f7f7; --card:#ffffff;
              --accent:#4f7dc9; --line:#e3e3e3; --muted:#8e8e91; --soft:#56565a; }
      * { box-sizing: border-box; }
      body { width: 300px; margin: 0; font-family: "Spline Sans", system-ui, sans-serif; background: var(--paper); color: var(--ink); }
      header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; }
      .om { width: 32px; height: 32px; border-radius: 7px; background: #073b4c;
            display: flex; flex-direction: column; align-items: center; justify-content: center; flex: none; }
      .om-eyes { display: flex; gap: 4.5px; animation: om-blink 3.2s infinite; }
      .om-eyes span { width: 3.5px; height: 3.5px; border-radius: 50%; background: #ffd166; }
      .om-mouthbox { height: 15px; display: flex; align-items: center; margin-top: 1.5px; }
      .om-mouth { font: 600 18px/0.8 "Fraunces", Georgia, serif; color: #f7f7f7; display: block;
                  animation: om-mouth 3.2s ease-in-out infinite; }
      @keyframes om-blink { 0%, 92%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.12); } }
      @keyframes om-mouth { 0%, 55%, 100% { transform: scaleY(1); } 70%, 82% { transform: scaleY(1.28); } }
      h1 { font-family: "Fraunces", Georgia, serif; font-weight: 600; font-size: 18px; margin: 0; letter-spacing: -0.01em; }
      h1 .dot { color: var(--accent); }
      .status { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 0 16px 12px; color: var(--soft); }
      .led { width: 9px; height: 9px; border-radius: 50%; background: #c2c2c2; }
      .led.on { background: #0aa87e; }
      .led.off { background: #b4452f; }
      .body { padding: 0 16px 16px; }
      button { font: 500 13px system-ui; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--line); background: var(--card); cursor: pointer; width: 100%; }
      button.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      details { margin-top: 14px; font-size: 12.5px; }
      summary { cursor: pointer; color: var(--soft); }
      label { display: block; margin: 8px 0 3px; color: var(--soft); }
      input { width: 100%; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; font: 13px "JetBrains Mono", ui-monospace, monospace; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
      .queue { font-size: 11.5px; color: var(--muted); margin-top: 10px; }
    </style>
  </head>
  <body>
    <header>
      <div class="om" aria-hidden="true">
        <div class="om-eyes"><span></span><span></span></div>
        <div class="om-mouthbox"><div class="om-mouth">O</div></div>
      </div>
      <h1>octo<span class="dot">·</span>base</h1>
    </header>
    <div class="status">
      <span class="led" id="led"></span>
      <span id="status-text">Checking…</span>
    </div>
    <div class="body">
      <button class="primary" id="capture">Capture this article</button>
      <div class="queue" id="queue"></div>
      <details>
        <summary>Connection settings</summary>
        <label for="port">Port</label>
        <input id="port" type="number" />
        <label for="token">Pairing token</label>
        <input id="token" type="text" placeholder="paste from octobase → Connect extension" />
        <div class="row"><button id="save">Save &amp; reconnect</button></div>
        <div class="hint">In octobase, open “Connect extension” to copy the port and token.</div>
      </details>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
